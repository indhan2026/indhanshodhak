<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndhanShodhak</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #0a1628;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .logo-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .logo-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,173,255,0.25) 0%, transparent 70%);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%       { transform: scale(1.15); opacity: 1; }
  }

  .logo-img {
    width: 160px;
    height: 160px;
    border-radius: 32px;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 40px rgba(59,173,255,0.3);
  }

  .app-name {
    margin-top: 28px;
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #FF9933 0%, #ffffff 50%, #138808 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: slideUp 0.6s ease 0.5s both;
    text-align: center;
  }

  .app-name-hindi {
    font-size: 1.1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 3px;
    margin-top: 4px;
    animation: slideUp 0.6s ease 0.65s both;
    text-align: center;
  }

  .tagline {
    margin-top: 12px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: slideUp 0.6s ease 0.8s both;
    text-align: center;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .loader-bar {
    margin-top: 48px;
    width: 160px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
    animation: fadeIn 0.5s ease 1s both;
  }

  .loader-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #FF9933, #3BADFF, #138808);
    border-radius: 99px;
    animation: load 2.2s ease 1.1s forwards;
  }

  @keyframes load {
    0%   { width: 0%; }
    100% { width: 100%; }
  }

  .powered {
    position: fixed;
    bottom: 28px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeIn 0.5s ease 1.5s both;
  }

  /* Floating fuel particles */
  .particle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }
  .p1 { background:#FF9933; left:10%; top:80%; animation-duration:6s; animation-delay:0s; }
  .p2 { background:#138808; left:25%; top:90%; animation-duration:8s; animation-delay:1s; }
  .p3 { background:#3BADFF; left:70%; top:85%; animation-duration:7s; animation-delay:2s; }
  .p4 { background:#FF9933; left:85%; top:75%; animation-duration:9s; animation-delay:0.5s; }
  .p5 { background:#ffffff; left:50%; top:95%; animation-duration:5s; animation-delay:1.5s; }

  @keyframes float {
    0%   { transform: translateY(0) scale(1);   opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
  }
</style>
</head>
