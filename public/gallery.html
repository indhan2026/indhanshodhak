<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — IndhanShodhak</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1a0a;color:#e8f5e9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border-bottom:1px solid rgba(76,175,80,0.15);position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand img{width:36px;height:36px;border-radius:8px}
.nav-brand span{font-size:17px;font-weight:700;color:#fff}
.nav-back{color:#4caf50;text-decoration:none;font-size:14px;display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid rgba(76,175,80,0.3);border-radius:50px;transition:all 0.2s}
.nav-back:hover{background:rgba(76,175,80,0.1)}

/* HEADER */
.header{text-align:center;padding:48px 16px 32px}
.header-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#4caf50;margin-bottom:10px}
.header h1{font-size:32px;font-weight:700;color:#fff;margin-bottom:8px}
.header p{font-size:14px;color:rgba(255,255,255,0.45)}

/* GALLERY GRID */
.gallery-container{max-width:1100px;margin:0 auto;padding:0 16px 60px}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:768px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.gallery-grid{grid-template-columns:1fr}}

.gallery-item{border-radius:12px;overflow:hidden;border:1px solid rgba(76,175,80,0.2);aspect-ratio:4/3;position:relative;cursor:pointer;transition:transform 0.2s,border-color 0.2s;background:rgba(255,255,255,0.03)}
.gallery-item:hover{transform:scale(1.02);border-color:rgba(76,175,80,0.45)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.8));font-size:11px;color:rgba(255,255,255,0.85);opacity:0;transition:opacity 0.2s}
.gallery-item:hover .gallery-caption{opacity:1}

/* LOADING */
.loading{text-align:center;padding:80px;color:rgba(255,255,255,0.4)}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(76,175,80,0.2);border-top-color:#4caf50;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 16px;color:rgba(255,255,255,0.4)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty p{font-size:14px}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:1000;align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:20px;right:24px;font-size:28px;color:#fff;cursor:pointer;background:none;border:none;opacity:0.7}
.lightbox-close:hover{opacity:1}
.lightbox-caption{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.6);font-size:13px}

/* ADD HINT */
.add-hint{text-align:center;padding:20px;color:rgba(255,255,255,0.25);font-size:12px;border-top:1px solid rgba(76,175,80,0.08);margin-top:20px}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <span>IndhanShodhak</span>
  </a>
  <a href="/" class="nav-back">← Back to Home</a>
</nav>

<div class="header">
  <p class="header-label">Our Journey</p>
  <h1>IndhanShodhak Gallery</h1>
  <p>Government meetings · Press coverage · App screenshots · Certificates</p>
</div>

<div class="gallery-container">
  <div class="gallery-grid" id="galleryGrid">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading gallery...</p>
    </div>
  </div>
  <div class="add-hint" id="addHint" style="display:none">
    📁 To add photos: copy images to /public/gallery/ folder and git push — they appear here automatically!
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
async function loadGallery() {
  const grid = document.getElementById('galleryGrid');
  const hint = document.getElementById('addHint');

  try {
    const res = await fetch('/api/gallery');
    const data = await res.json();

    if (!data.images || data.images.length === 0) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">🖼️</div>
          <p>No images yet — add photos to /public/gallery/ folder</p>
        </div>`;
      hint.style.display = 'block';
      return;
    }

    grid.innerHTML = '';
    data.images.forEach(img => {
      const name = img.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.onclick = () => openLightbox('/gallery/' + img, name);
      div.innerHTML = `
        <img src="/gallery/${img}" alt="${name}" loading="lazy">
        <div class="gallery-caption">${name}</div>`;
      grid.appendChild(div);
    });

    hint.style.display = 'block';
  } catch(e) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">⚠️</div>
        <p>Could not load gallery</p>
      </div>`;
  }
}

function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e) {
  if (!e || e.target !== document.getElementById('lightboxImg')) {
    document.getElementById('lightbox').classList.remove('active');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

loadGallery();
</script>

</body>
</html>
